  - "192.168.100.252"

# Kerberos
kerberos_kdc: "altsrv2.den.skv"
kerberos_admin_server: "altsrv2.den.skv"

# Общие пакеты
base_packages:
  - curl
  - wget
  - vim
  - rsync
  - sshpass
